name: docker-compose-check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  compose-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check Python syntax
        run: |
          if [ -d "08_multi-agent-service-mini-project" ]; then
            python -m compileall 08_multi-agent-service-mini-project
          else
            python -m compileall .
          fi

      - name: Validate Docker Compose config
        run: |
          if [ -d "08_multi-agent-service-mini-project" ]; then
            cd 08_multi-agent-service-mini-project/99_team-projects/multi-agent-service-team-template
          fi
          cp .env.example .env
          docker compose config

      - name: Build Docker image
        run: |
          if [ -d "08_multi-agent-service-mini-project" ]; then
            cd 08_multi-agent-service-mini-project/99_team-projects/multi-agent-service-team-template
          fi
          docker build -t multi-agent-service-template .
